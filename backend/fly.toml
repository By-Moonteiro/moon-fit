# fly.toml app configuration file generated for moonfit-backend on 2026-04-04T19:09:29-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'moonfit-backend'
primary_region = 'gru'

[build]

[deploy]
  release_command = './node_modules/.bin/prisma migrate deploy'

[http_service]
  internal_port = 3333
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
