<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060612"/>
      <stop offset="100%" style="stop-color:#0e0520"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8b4fe"/>
      <stop offset="30%" style="stop-color:#a78bfa"/>
      <stop offset="60%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>

    <linearGradient id="moonGrad" cx="40%" cy="35%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%" style="stop-color:#f5f0ff"/>
      <stop offset="50%" style="stop-color:#c4b5fd"/>
      <stop offset="100%" style="stop-color:#5b21b6"/>
    </linearGradient>

    <radialGradient id="moonRadial" cx="38%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#ede9fe"/>
      <stop offset="55%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </radialGradient>

    <radialGradient id="haloGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="moonGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="200" fill="url(#bgGrad)" rx="14"/>

  <!-- Nebula atmosphere -->
  <ellipse cx="130" cy="100" rx="90" ry="60" fill="#6d28d9" opacity="0.07"/>
  <ellipse cx="390" cy="100" rx="90" ry="60" fill="#1d4ed8" opacity="0.07"/>
  <ellipse cx="260" cy="50" rx="120" ry="35" fill="#7c3aed" opacity="0.06"/>

  <!-- === STARS === -->
  <!-- Tiny dots -->
  <circle cx="20" cy="18" r="1" fill="#e9d5ff" opacity="0.8"/>
  <circle cx="48" cy="35" r="0.8" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="75" cy="12" r="1.2" fill="#ddd6fe" opacity="0.9" filter="url(#softGlow)"/>
  <circle cx="110" cy="175" r="1" fill="#a5b4fc" opacity="0.7"/>
  <circle cx="145" cy="185" r="0.8" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="180" cy="10" r="1" fill="#e9d5ff" opacity="0.8" filter="url(#softGlow)"/>
  <circle cx="210" cy="190" r="1.2" fill="#a5b4fc" opacity="0.7"/>
  <circle cx="310" cy="188" r="1" fill="#ddd6fe" opacity="0.8"/>
  <circle cx="340" cy="8" r="0.8" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="375" cy="180" r="1.2" fill="#a5b4fc" opacity="0.9" filter="url(#softGlow)"/>
  <circle cx="405" cy="14" r="1" fill="#e9d5ff" opacity="0.7"/>
  <circle cx="440" cy="185" r="0.8" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="470" cy="20" r="1.2" fill="#ddd6fe" opacity="0.8" filter="url(#softGlow)"/>
  <circle cx="500" cy="160" r="1" fill="#a5b4fc" opacity="0.7"/>
  <circle cx="510" cy="75" r="0.8" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="12" cy="140" r="1" fill="#e9d5ff" opacity="0.8"/>
  <circle cx="505" cy="40" r="1" fill="#ddd6fe" opacity="0.7"/>

  <!-- 4-point sparkles -->
  <g transform="translate(35, 58)" filter="url(#softGlow)">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#e9d5ff" stroke-width="1.5" opacity="0.8"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#e9d5ff" stroke-width="1.5" opacity="0.8"/>
    <line x1="-3" y1="-3" x2="3" y2="3" stroke="#e9d5ff" stroke-width="0.6" opacity="0.4"/>
    <line x1="3" y1="-3" x2="-3" y2="3" stroke="#e9d5ff" stroke-width="0.6" opacity="0.4"/>
  </g>
  <g transform="translate(485, 110)" filter="url(#softGlow)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#bfdbfe" stroke-width="1.5" opacity="0.8"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#bfdbfe" stroke-width="1.5" opacity="0.8"/>
    <line x1="-3" y1="-3" x2="3" y2="3" stroke="#bfdbfe" stroke-width="0.5" opacity="0.4"/>
    <line x1="3" y1="-3" x2="-3" y2="3" stroke="#bfdbfe" stroke-width="0.5" opacity="0.4"/>
  </g>
  <g transform="translate(90, 170)" filter="url(#softGlow)">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#ddd6fe" stroke-width="1.2" opacity="0.7"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#ddd6fe" stroke-width="1.2" opacity="0.7"/>
  </g>
  <g transform="translate(430, 170)" filter="url(#softGlow)">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#a5b4fc" stroke-width="1.2" opacity="0.7"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#a5b4fc" stroke-width="1.2" opacity="0.7"/>
  </g>
  <g transform="translate(500, y)" filter="url(#softGlow)">
  </g>

  <!-- === MOON centered top === -->
  <circle cx="260" cy="38" r="30" fill="url(#haloGrad)" filter="url(#moonGlow)"/>
  <circle cx="260" cy="38" r="19" fill="url(#moonRadial)" filter="url(#moonGlow)"/>
  <!-- craters -->
  <circle cx="253" cy="32" r="3" fill="#7c3aed" opacity="0.4"/>
  <circle cx="263" cy="42" r="2" fill="#6d28d9" opacity="0.35"/>
  <circle cx="268" cy="30" r="1.5" fill="#7c3aed" opacity="0.3"/>
  <!-- highlight -->
  <ellipse cx="254" cy="31" rx="5" ry="4" fill="white" opacity="0.22"/>

  <!-- Moon orbit dots -->
  <circle cx="234" cy="26" r="1.8" fill="#c4b5fd" opacity="0.8" filter="url(#softGlow)"/>
  <circle cx="287" cy="24" r="1.5" fill="#93c5fd" opacity="0.8" filter="url(#softGlow)"/>
  <circle cx="290" cy="46" r="1.8" fill="#a5b4fc" opacity="0.7" filter="url(#softGlow)"/>
  <circle cx="230" cy="48" r="1.5" fill="#c4b5fd" opacity="0.7" filter="url(#softGlow)"/>

  <!-- Constellation lines near moon -->
  <circle cx="220" cy="22" r="1.2" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="213" cy="38" r="1" fill="#a5b4fc" opacity="0.45"/>
  <line x1="220" y1="22" x2="213" y2="38" stroke="#c4b5fd" stroke-width="0.5" opacity="0.25"/>
  <circle cx="298" cy="20" r="1.2" fill="#93c5fd" opacity="0.5"/>
  <circle cx="305" cy="36" r="1" fill="#a5b4fc" opacity="0.45"/>
  <line x1="298" y1="20" x2="305" y2="36" stroke="#93c5fd" stroke-width="0.5" opacity="0.25"/>

  <!-- === DUMBBELL icon (subtle, left of text) === -->
  <g transform="translate(58, 113)" opacity="0.55" filter="url(#softGlow)">
    <!-- bar -->
    <rect x="8" y="6" width="28" height="4" rx="2" fill="#a78bfa"/>
    <!-- left plates -->
    <rect x="2" y="2" width="6" height="12" rx="2" fill="#c4b5fd"/>
    <rect x="0" y="4" width="3" height="8" rx="1.5" fill="#ddd6fe"/>
    <!-- right plates -->
    <rect x="36" y="2" width="6" height="12" rx="2" fill="#c4b5fd"/>
    <rect x="41" y="4" width="3" height="8" rx="1.5" fill="#ddd6fe"/>
  </g>

  <!-- === MAIN TEXT "MOONFIT" === -->
  <!-- Using a bold blocky font with letter-spacing for pixel-ish feel -->
  <text
    x="260"
    y="126"
    font-family="'Trebuchet MS', 'Arial Black', sans-serif"
    font-size="52"
    font-weight="900"
    fill="url(#textGrad)"
    text-anchor="middle"
    letter-spacing="8"
    filter="url(#textGlow)"
    style="text-transform:uppercase"
  >MOONFIT</text>

  <!-- Pixel-style outline overlay for blocky effect -->
  <text
    x="260"
    y="126"
    font-family="'Trebuchet MS', 'Arial Black', sans-serif"
    font-size="52"
    font-weight="900"
    fill="none"
    stroke="url(#textGrad)"
    stroke-width="0.5"
    text-anchor="middle"
    letter-spacing="8"
    opacity="0.3"
  >MOONFIT</text>

  <!-- Divider line -->
  <rect x="80" y="140" width="360" height="1.5" fill="url(#textGrad)" opacity="0.4" rx="1"/>

  <!-- === TAGLINE === -->
  <text
    x="260"
    y="162"
    font-family="'Courier New', Courier, monospace"
    font-size="11"
    fill="#94a3b8"
    text-anchor="middle"
    letter-spacing="5"
    opacity="0.75"
  >WORKOUT  TRACKER  API</text>

  <!-- Corner pixel decorations -->
  <rect x="8" y="8" width="4" height="4" rx="1" fill="#7c3aed" opacity="0.7"/>
  <rect x="14" y="8" width="4" height="4" rx="1" fill="#6d28d9" opacity="0.4"/>
  <rect x="8" y="14" width="4" height="4" rx="1" fill="#6d28d9" opacity="0.4"/>

  <rect x="508" y="8" width="4" height="4" rx="1" fill="#2563eb" opacity="0.7"/>
  <rect x="502" y="8" width="4" height="4" rx="1" fill="#1d4ed8" opacity="0.4"/>
  <rect x="508" y="14" width="4" height="4" rx="1" fill="#1d4ed8" opacity="0.4"/>

  <rect x="8" y="188" width="4" height="4" rx="1" fill="#7c3aed" opacity="0.7"/>
  <rect x="14" y="188" width="4" height="4" rx="1" fill="#6d28d9" opacity="0.4"/>
  <rect x="8" y="182" width="4" height="4" rx="1" fill="#6d28d9" opacity="0.4"/>

  <rect x="508" y="188" width="4" height="4" rx="1" fill="#2563eb" opacity="0.7"/>
  <rect x="502" y="188" width="4" height="4" rx="1" fill="#1d4ed8" opacity="0.4"/>
  <rect x="508" y="182" width="4" height="4" rx="1" fill="#1d4ed8" opacity="0.4"/>
</svg>
